services:
  bot:
    build: .
    container_name: pms-bot
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      BOT_ENCRYPTION_KEY: ${BOT_ENCRYPTION_KEY}
      BOT_PUBLIC_URL: ${BOT_PUBLIC_URL}
      PMS_BASE_URL: ${PMS_BASE_URL:-https://iqube.therig.in}
      FASTAPI_HOST: "0.0.0.0"
      FASTAPI_PORT: "8765"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    networks:
      - pms-bot-net

  tailscale:
    image: tailscale/tailscale:latest
    container_name: pms-bot-tailscale
    hostname: pms-bot
    restart: unless-stopped
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY}
      TS_HOSTNAME: pms-bot
      TS_STATE_DIR: /var/lib/tailscale
      TS_SERVE_CONFIG: /config/serve.json
      TS_USERSPACE: "true"
    volumes:
      - ./data/tailscale:/var/lib/tailscale
      - ./tailscale-serve.json:/config/serve.json:ro
    depends_on:
      - bot
    networks:
      - pms-bot-net

networks:
  pms-bot-net:
    driver: bridge
