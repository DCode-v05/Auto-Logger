<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MFA code</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0; padding: 24px;
      background: var(--tg-theme-bg-color, #fff);
      color: var(--tg-theme-text-color, #000);
    }
    h1 { font-size: 20px; margin: 0 0 16px; }
    input {
      width: 100%; box-sizing: border-box; padding: 14px;
      font-size: 22px; letter-spacing: 6px; text-align: center;
      border: 1px solid var(--tg-theme-hint-color, #ccc); border-radius: 8px;
      background: var(--tg-theme-secondary-bg-color, #f5f5f5);
      color: var(--tg-theme-text-color, #000);
    }
    button {
      margin-top: 18px; width: 100%;
      padding: 14px; font-size: 16px; font-weight: 600;
      background: var(--tg-theme-button-color, #2481cc);
      color: var(--tg-theme-button-text-color, #fff);
      border: 0; border-radius: 8px;
    }
    .error { color: #c33; font-size: 13px; margin-top: 10px; }
  </style>
</head>
<body>
  <h1>Enter MFA code</h1>
  <form id="mfaForm">
    <input id="code" name="code" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="8"
           autocomplete="one-time-code" required placeholder="######" />
    <button type="submit" id="submitBtn">Submit</button>
    <div class="error" id="errorMsg"></div>
  </form>
  <script>
    const tg = window.Telegram?.WebApp;
    if (tg) { tg.ready(); tg.expand(); }
    const form = document.getElementById('mfaForm');
    const btn = document.getElementById('submitBtn');
    const errBox = document.getElementById('errorMsg');
    document.getElementById('code').focus();
    form.addEventListener('submit', async (ev) => {
      ev.preventDefault();
      errBox.textContent = '';
      btn.disabled = true;
      btn.textContent = 'Submitting…';
      const data = new FormData(form);
      data.append('init_data', tg?.initData || '');
      try {
        const res = await fetch('/webapp/mfa', { method: 'POST', body: data });
        if (!res.ok) {
          let detail = (await res.json().catch(() => ({}))).detail;
          if (Array.isArray(detail)) detail = detail.map(e => (e.loc || []).join('.') + ': ' + e.msg).join('; ');
          throw new Error(detail || res.statusText);
        }
        if (tg) tg.close();
      } catch (e) {
        errBox.textContent = e.message || 'Failed';
        btn.disabled = false;
        btn.textContent = 'Submit';
      }
    });
  </script>
</body>
</html>
