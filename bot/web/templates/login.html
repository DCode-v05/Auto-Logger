<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in to iQube</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root { color-scheme: light dark; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 24px;
      background: var(--tg-theme-bg-color, #fff);
      color: var(--tg-theme-text-color, #000);
    }
    h1 { font-size: 20px; margin: 0 0 16px; }
    p.note { font-size: 13px; opacity: 0.8; margin: 0 0 20px; }
    label { display: block; font-size: 13px; margin: 16px 0 6px; }
    input[type=email], input[type=password] {
      width: 100%; box-sizing: border-box; padding: 12px;
      border: 1px solid var(--tg-theme-hint-color, #ccc);
      border-radius: 8px; font-size: 16px;
      background: var(--tg-theme-secondary-bg-color, #f5f5f5);
      color: var(--tg-theme-text-color, #000);
    }
    button {
      margin-top: 24px; width: 100%;
      padding: 14px; font-size: 16px; font-weight: 600;
      background: var(--tg-theme-button-color, #2481cc);
      color: var(--tg-theme-button-text-color, #fff);
      border: 0; border-radius: 8px; cursor: pointer;
    }
    button[disabled] { opacity: 0.5; }
    .warn { font-size: 12px; margin-top: 20px; opacity: 0.75; line-height: 1.4; }
    .error { color: #c33; font-size: 13px; margin-top: 10px; }
  </style>
</head>
<body>
  <h1>Sign in to iQube</h1>
  <p class="note">The bot will sign in to <code>{{ pms_base_url }}</code> on your behalf using your college Microsoft account.</p>

  <form id="loginForm">
    <label for="email">College email</label>
    <input id="email" name="email" type="email" required autocomplete="username" />
    <label for="password">Microsoft password</label>
    <input id="password" name="password" type="password" required autocomplete="current-password" />
    <button type="submit" id="submitBtn">Sign in</button>
    <div class="error" id="errorMsg"></div>
  </form>

  <p class="warn">Your password is sent directly to this bot over HTTPS and used once to complete the Microsoft sign-in. It is not stored on the bot's server.</p>

  <script>
    const tg = window.Telegram?.WebApp;
    if (tg) { tg.ready(); tg.expand(); }
    const form = document.getElementById('loginForm');
    const btn = document.getElementById('submitBtn');
    const errBox = document.getElementById('errorMsg');
    form.addEventListener('submit', async (ev) => {
      ev.preventDefault();
      errBox.textContent = '';
      btn.disabled = true;
      btn.textContent = 'Signing in…';
      const data = new FormData(form);
      data.append('initData', tg?.initData || '');
      try {
        const res = await fetch('/webapp/login', { method: 'POST', body: data });
        if (!res.ok) {
          const detail = (await res.json().catch(() => ({}))).detail || res.statusText;
          throw new Error(detail);
        }
        if (tg) {
          tg.showPopup({
            title: 'Sign-in started',
            message: 'Return to the chat — follow the prompts there.',
            buttons: [{ type: 'close' }],
          }, () => tg.close());
        }
      } catch (e) {
        errBox.textContent = e.message || 'Sign-in failed';
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    });
  </script>
</body>
</html>
